<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário -GET e PPOST</title>
</head>
<body>
    <h1>GET e POST</h1>
    <h2>GET</h2>
    <form action="http://127.0.0.1:3000/tacos" method="get">
        <input type="text" name="carne" id="carne">
        <input type="number" name="qtd" id="qtd">
        <button>Submeter</button>
    </form>
    <hr>
    <h2>POST</h2>
    <form action="http://127.0.0.1:3000/tacos" method="post">
        <input type="text" name="carne" id="carne">
        <input type="number" name="qtd" id="qtd">
        <button>Submeter</button>
    </form>
</body>
</html>
